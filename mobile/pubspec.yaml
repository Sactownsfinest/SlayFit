name: slayfit
description: "SlayFit - Intelligent Weight Loss & Fitness Mobile App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0

  # HTTP & API
  http: ^1.1.0

  # Local Storage
  shared_preferences: ^2.2.0

  # UI & Design
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0

  # Charts & Graphs
  fl_chart: ^0.65.0

  # Date & Time
  intl: ^0.19.0

  # Utilities
  logger: ^2.0.0

  # Barcode Scanner
  mobile_scanner: ^5.2.3

  # Push Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

dependency_overrides:
  # Force older iOS platform packages to avoid objective_c >=6.x build hook
  # that fails on Windows paths with spaces (C:\Users\Dan Maeon\...)
  path_provider_foundation: 2.3.2
  shared_preferences_foundation: 2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/data/


flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0E1A"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  web:
    generate: false
