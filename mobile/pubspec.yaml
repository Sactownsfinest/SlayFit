name: slayfit
description: "SlayFit - Intelligent Weight Loss & Fitness Mobile App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0

  # HTTP & API
  http: ^1.1.0

  # Local Storage
  shared_preferences: ^2.2.0

  # UI & Design
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0

  # Charts & Graphs
  fl_chart: ^0.65.0

  # Date & Time
  intl: ^0.19.0

  # Utilities
  logger: ^2.0.0

  # Barcode Scanner
  mobile_scanner: ^5.2.3

  # Push Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Fitbit OAuth 2.0 + real-time steps
  flutter_web_auth_2: ^4.0.0
  crypto: ^3.0.3

  # Sharing
  share_plus: ^10.0.0

  # Speech-to-text (voice input for AI Coach)
  speech_to_text: ^7.0.0

  # YouTube inline video player (guided workout videos)
  youtube_player_flutter: ^9.1.1

  # Progress photos (pick from gallery or camera)
  image_picker: ^1.1.2

  # Permanent file storage for progress photos
  path_provider: ^2.1.0

  # Device timezone detection (required for correct notification scheduling)
  flutter_timezone: ^3.0.0

  # Text-to-speech (AI Coach voice output)
  flutter_tts: ^4.0.2

  # Audio playback for guided workout classes
  audioplayers: ^6.0.0

  # Firebase (community challenges, real-time chat, social)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_database: ^11.1.4

dependency_overrides:
  # Force older iOS platform packages to avoid objective_c >=6.x build hook
  # that fails on Windows paths with spaces (C:\Users\Dan Maeon\...)
  path_provider_foundation: 2.3.2
  shared_preferences_foundation: 2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/data/
    - assets/audio/morning_stretch/


flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0E1A"
  adaptive_icon_foreground: "assets/images/app_icon_adaptive_fg.png"
  web:
    generate: false
